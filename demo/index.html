<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async JS Demo</title>
    <style>
      :root {
        --bg: #f7f6f3;
        --card: #ffffff;
        --text: #212121;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #e7f7f2, var(--bg) 40%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #334155;
      }

      pre {
        background: #0b1320;
        color: #d6e4ff;
        border-radius: 10px;
        padding: 14px;
        min-height: 220px;
        overflow: auto;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Async JavaScript Browser Demo</h1>
      <p>Open console-like logs below and run demos.</p>
      <div class="controls">
        <button id="orderBtn">Event Loop Order</button>
        <button id="parallelBtn">Sequential vs Parallel</button>
        <button id="fetchBtn">Fetch API Demo</button>
        <button id="errorBtn" class="secondary">Try/Catch Error Flow</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
      <pre id="log"></pre>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
