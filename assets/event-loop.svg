<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .text { font: 500 14px Arial, sans-serif; fill: #374151; }
      .box { stroke-width: 2; rx: 12; ry: 12; }
      .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <rect width="1100" height="620" fill="#f8fafc" />
  <text x="40" y="48" class="title">JavaScript Event Loop (Simplified)</text>

  <rect x="40" y="90" width="290" height="150" class="box" fill="#dbeafe" stroke="#2563eb" />
  <text x="60" y="125" class="label">1) Call Stack</text>
  <text x="60" y="152" class="text">Runs synchronous JavaScript</text>
  <text x="60" y="176" class="text">one frame at a time.</text>
  <text x="60" y="206" class="text">Must be empty before queued tasks run.</text>

  <rect x="390" y="90" width="320" height="150" class="box" fill="#dcfce7" stroke="#16a34a" />
  <text x="410" y="125" class="label">2) Runtime APIs</text>
  <text x="410" y="152" class="text">Timers, fetch, DOM events, etc.</text>
  <text x="410" y="176" class="text">Work happens outside the stack.</text>
  <text x="410" y="206" class="text">When done, callbacks are queued.</text>

  <rect x="770" y="90" width="290" height="150" class="box" fill="#fee2e2" stroke="#dc2626" />
  <text x="790" y="125" class="label">3) Queues</text>
  <text x="790" y="152" class="text">Microtask queue: Promise callbacks</text>
  <text x="790" y="176" class="text">Macrotask queue: setTimeout/events</text>
  <text x="790" y="206" class="text">Microtasks have higher priority.</text>

  <rect x="300" y="330" width="500" height="220" class="box" fill="#fef3c7" stroke="#d97706" />
  <text x="320" y="365" class="label">4) Event Loop Rules</text>
  <text x="320" y="395" class="text">A. If Call Stack is empty, take one Macrotask.</text>
  <text x="320" y="425" class="text">B. Run it to completion on the Call Stack.</text>
  <text x="320" y="455" class="text">C. Then drain all Microtasks.</text>
  <text x="320" y="485" class="text">D. Render (browser), then repeat.</text>
  <text x="320" y="525" class="text">Result: Promise callbacks run before next timer callback.</text>

  <path d="M330 165 L390 165" class="arrow" />
  <path d="M710 165 L770 165" class="arrow" />
  <path d="M915 240 L915 300 L550 300 L550 330" class="arrow" />
  <path d="M300 440 L220 440 L220 240" class="arrow" />
  <path d="M220 240 L330 240" class="arrow" />

  <text x="810" y="290" class="text">Event loop selects next task</text>
  <text x="70" y="275" class="text">Task executes here</text>
</svg>
